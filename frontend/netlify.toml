[build]
  publish = "."
  command = "echo 'No build required - static site'"

# Redirect authentication and dashboard to backend
[[redirects]]
  from = "/auth/*"
  to = "https://your-backend-url.railway.app/auth/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard/*"
  to = "https://your-backend-url.railway.app/dashboard/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/secure/*"
  to = "https://your-backend-url.railway.app/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
